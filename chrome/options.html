<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --text2: #8b949e; --accent: #0078D4; --border: #30363d; --radius: 8px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 100%; max-width: 420px; }
h1 { font-size: 20px; margin-bottom: 24px; }
label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; margin-top: 16px; }
input { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; }
input:focus { outline: none; border-color: var(--accent); }
button { width: 100%; padding: 12px; margin-top: 24px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; }
button:hover { opacity: 0.9; }
#status { margin-top: 12px; font-size: 13px; color: var(--text2); text-align: center; }
.hint { font-size: 12px; color: var(--text2); margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <h1>⚙️ Configuración del Addon</h1>
  <label>URL del Backend</label>
  <input type="text" id="backendUrl" placeholder="http://192.168.1.100:5900">
  <div class="hint">Dirección del servidor DNX Downloader</div>
  <label>Usuario</label>
  <input type="text" id="username" placeholder="usuario">
  <label>Contraseña</label>
  <input type="password" id="password" placeholder="contraseña">
  <button id="saveBtn">Guardar</button>
  <div id="status"></div>
</div>
<script src="options.js"></script>
</body>
</html>
